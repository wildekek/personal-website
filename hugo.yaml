title: Willem Vooijs
baseURL: https://vooijs.eu/
theme: hugo-blog-awesome
# Derive each page's lastmod from its git commit date (no manual front-matter bumping).
# Requires the deploy workflow to checkout full history (fetch-depth: 0).
enableGitInfo: true
# To enable Google Analytics 4 (gtag.js) provide G-MEASUREMENT_ID below.
# To disable  Google Analytics, simply leave the field empty or remove the next line
googleAnalytics: G-FFEE1FZEXZ # G-MEASUREMENT_ID
defaultContentLanguage: en
languages:
  en:
    locale: en-us
    label: English
    weight: 1
  nl:
    locale: nl
    label: Nederlands
    weight: 2
# Enable emojis globally
enableEmoji: true
#ignoreErrors = ["additional-script-loading-error"] # ignore error of loading additional scripts.
markup:
  # set markup.highlight.noClasses=false to enable code highlight
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2 # ToC starts from H2
    endLevel: 4 # ToC ends at H4
    ordered: false # generates <ul> instead of <ol>
menu:
  main:
  # The page reference (pageRef) is useful for menu highlighting
  # When pageRef is set, setting `url` is optional; it will be used as a fallback if the page is not found.  
  - pageRef: /
    name: Home
    url: /
    weight: 10
  - pageRef: posts
    name: Posts
    url: /posts/
    weight: 20
  - pageRef: about
    name: About
    url: /about/
    weight: 30
params:
  sitename: Willem Vooijs
  defaultColor: dark
  description: Willem Vooijs - builder and tinkerer sharing insights on electronics, home automation, open source software, and sustainable energy
  mainSections:
  - posts
  toc: false
  goToTop: true
  additionalScripts: []
  dateFormat: January 2, 2006
  rssFeedDescription: summary
  author:
    avatar: avatar.jpg
    intro: Hi, I'm Willem Vooijs.
    name: Willem Vooijs
    description: I've worn a lot of hats in tech; the constant is that I love to
      build things and understand how they work. Electronics, home automation,
      open source software and sustainable energy.
  socialIcons:
  - name: github
    url: https://github.com/wildekek
  - name: linkedin
    url: https://www.linkedin.com/in/willemvooijs/
  - name: email
    url: mailto:willem@vooijs.eu
module:
  imports:
  - path: github.com/hugo-sid/hugo-blog-awesome
